name: PR Checks — Lint and Test

on:
  pull_request:
    branches:
      - main

# Cancel superseded runs on the same PR branch to save runner minutes.
concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ── Backend lint + tests ──────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebase/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run backend tests
        run: ./gradlew cleanTest test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-pr
          path: codebase/backend/build/reports/tests/

  # ── Frontend lint + tests ─────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebase/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: codebase/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run frontend tests
        run: npx vitest run

  # ── Docker build smoke test ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image (no push)
        run: docker build -t kanban-backend:pr-smoke codebase/backend/

      - name: Build frontend image (no push)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:8080 \
            --build-arg NEXT_PUBLIC_WS_URL=http://localhost:8080/ws \
            --build-arg NEXT_PUBLIC_AGENT_URL=http://localhost:8001 \
            -t kanban-frontend:pr-smoke codebase/frontend/
