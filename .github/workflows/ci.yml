name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run backend unit tests
        working-directory: backend
        run: >
          ./gradlew test
          --tests "com.kanban.filter.*"
          --tests "com.kanban.service.*"
          --tests "com.kanban.websocket.*"
          --tests "com.kanban.controller.HealthControllerTest"
          --no-daemon
        env:
          JWT_SECRET: ci-test-secret-value-at-least-32-chars

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test/

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --no-cache -t kanban-backend:ci ./backend

      - name: Build frontend image
        run: >
          docker build --no-cache
          --build-arg NEXT_PUBLIC_API_URL=http://localhost:8080
          --build-arg NEXT_PUBLIC_WS_URL=http://localhost:8080/ws
          -t kanban-frontend:ci ./frontend
