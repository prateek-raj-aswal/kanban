name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Backend build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run backend unit tests
        working-directory: backend
        run: >
          ./gradlew test
          --tests "com.kanban.filter.*"
          --tests "com.kanban.service.*"
          --tests "com.kanban.websocket.*"
          --tests "com.kanban.controller.HealthControllerTest"
          --no-daemon
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test/

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  docker-build:
    name: Docker build and tag
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            -t kanban-backend:${{ github.sha }} \
            -t kanban-backend:latest \
            ./backend
        env:
          # Secrets are not passed as build args — image must remain secret-free.
          # All runtime secrets are injected via environment variables at deploy time.
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRY_MS: ${{ secrets.JWT_EXPIRY_MS }}

      - name: Build frontend image
        run: >
          docker build --no-cache
          --build-arg NEXT_PUBLIC_API_URL=http://localhost:8080
          --build-arg NEXT_PUBLIC_WS_URL=http://localhost:8080/ws
          -t kanban-frontend:${{ github.sha }}
          ./frontend
