name: CI — Build, Test, Push, Deploy

on:
  push:
    branches:
      - main

# Prevent concurrent deploys to the same environment from racing.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

jobs:
  # ── Backend unit + integration tests ─────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebase/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run backend tests
        run: ./gradlew cleanTest test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: codebase/backend/build/reports/tests/

  # ── Frontend unit tests ───────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebase/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: codebase/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npx vitest run

  # ── Build Docker images, push to ECR ─────────────────────────────────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    outputs:
      backend-image: ${{ steps.meta-backend.outputs.image }}
      frontend-image: ${{ steps.meta-frontend.outputs.image }}
      agent-image: ${{ steps.meta-agent.outputs.image }}
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: image-tag
        # Use the short SHA for traceability; every push to main gets a unique tag.
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: meta-backend
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/kanban-backend:${{ steps.image-tag.outputs.tag }}"
          docker build -t "$IMAGE" codebase/backend/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        id: meta-frontend
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/kanban-frontend:${{ steps.image-tag.outputs.tag }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_WS_URL="${{ vars.NEXT_PUBLIC_WS_URL }}" \
            --build-arg NEXT_PUBLIC_AGENT_URL="${{ vars.NEXT_PUBLIC_AGENT_URL }}" \
            -t "$IMAGE" codebase/frontend/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push agent image
        id: meta-agent
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/kanban-agent:${{ steps.image-tag.outputs.tag }}"
          docker build -t "$IMAGE" codebase/agent/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ── Deploy to EC2 via SSH ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          # EC2 instance must have an IAM role with AmazonEC2ContainerRegistryReadOnly.
          # EC2_DEPLOY_PATH defaults to ~/app — override via GitHub variable if different.
          script: |
            set -e
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            cd "${{ vars.EC2_DEPLOY_PATH || '~/app' }}"
            IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }} \
              ECR_REGISTRY=${{ env.ECR_REGISTRY }} \
              docker compose -f docker-compose.prod.yml pull
            IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }} \
              ECR_REGISTRY=${{ env.ECR_REGISTRY }} \
              docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
