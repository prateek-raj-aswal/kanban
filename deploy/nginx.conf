upstream kanban_backend {
    server kanban-backend:8080;
}

upstream kanban_frontend {
    server kanban-frontend:3000;
}

server {
    listen 80;
    server_name ec2-35-154-3-162.ap-south-1.compute.amazonaws.com;

    client_max_body_size 20M;

    # Backend REST API
    location /api/ {
        proxy_pass         http://kanban_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (STOMP over SockJS — used by board real-time collaboration)
    location /ws {
        proxy_pass         http://kanban_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Frontend — everything else
    location / {
        proxy_pass         http://kanban_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Next.js server-sent events / hot reload (not used in prod but harmless)
        proxy_set_header   Connection        "";
    }
}
