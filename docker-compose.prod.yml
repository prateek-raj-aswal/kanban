# Production deployment — self-contained stack.
# Postgres runs as a service with a named Docker volume for data persistence.
# Nginx reverse-proxies port 80 → frontend and /api, /ws → backend.
#
# Usage:
#   cp .env.prod.example .env   # fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d
#
# To deploy fresh (with data migration): run deploy/deploy.sh instead.

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - kanban-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Port NOT exposed externally — backend reaches it via Docker network only

  # ── Backend ───────────────────────────────────────────────────────────────────
  kanban-backend:
    image: kanban-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_MS: ${JWT_EXPIRY_MS:-900000}
      JWT_REFRESH_EXPIRY_MS: ${JWT_REFRESH_EXPIRY_MS:-604800000}
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - kanban-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    # Port NOT exposed externally — Nginx routes /api and /ws to this service

  # ── Frontend ──────────────────────────────────────────────────────────────────
  kanban-frontend:
    image: kanban-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      kanban-backend:
        condition: service_healthy
    environment:
      HOSTNAME: "0.0.0.0"
    # Port NOT exposed externally — Nginx routes / to this service

  # ── Reverse proxy ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kanban-frontend
      - kanban-backend

volumes:
  kanban-postgres-data:   # Named volume — survives container restarts and removals
  kanban-uploads:         # File upload persistence
