version: 1

# ═══════════════════════════════════════════════════════
# MEMORY STORES
# ═══════════════════════════════════════════════════════
#
# Memory enables cross-step and cross-run context sharing.
# Each store has a defined schema, access pattern, and retention policy.
#
# Access conventions:
#   - Read:  {{memory.<store_name>}}            → full store contents
#   - Read:  {{memory.<store_name>.<field>}}     → specific field
#   - Write: action: write_memory + store: <name> + data: {...}
#
# Retention policies:
#   - per_run:     cleared at the start of each pipeline run
#   - persistent:  retained across runs, accumulates over time
#   - rolling:     keeps last N entries, evicts oldest

memory:

  # ─────────────────────────────────────────────
  # 1. DECISIONS LOG
  # ─────────────────────────────────────────────

  - name: decisions_log
    description: >
      Records architecture and design decisions made during each pipeline phase.
      Used by doc_writer to generate ADRs and by architect to maintain consistency
      across refinement iterations.
    retention: persistent
    max_entries: 500

    schema:
      entry:
        id: string            # auto-generated UUID
        timestamp: datetime   # ISO 8601, auto-set on write
        phase: string         # planning | architecture | implementation | deployment
        artifact: string      # prd | design | backend | frontend | deployment
        version: string       # v1 | draft | final
        title: string         # short summary of the decision
        context: string       # why was this decision needed?
        decision: string      # what was decided
        alternatives: list    # what other options were considered
        consequences: string  # trade-offs and downstream impact
        content: string       # full artifact content at this version
        run_id: string        # pipeline run identifier

    access_patterns:
      - who: planner, architect
        when: refine steps
        how: read previous decisions to maintain consistency
      - who: doc_writer
        when: generate_docs workflow
        how: read all entries to produce ADRs
      - who: reviewer
        when: review steps
        how: read to check if current artifact contradicts past decisions

    written_by:
      - workflow: planning/idea_to_plan → log_planning_decisions
      - workflow: execution/full_pipeline → log_architecture
      - workflow: review/final_review → rejection_notes

  # ─────────────────────────────────────────────
  # 2. BUG HISTORY
  # ─────────────────────────────────────────────

  - name: bug_history
    description: >
      Stores bugs found during QA testing. Used to track recurring issues,
      inform regression testing, and feed the patterns store with defensive
      coding patterns when bugs are resolved.
    retention: persistent
    max_entries: 1000

    schema:
      entry:
        id: string              # auto-generated UUID
        timestamp: datetime     # ISO 8601, auto-set on write
        phase: string           # testing | security | review
        severity: string        # P0-critical | P1-high | P2-medium | P3-low
        category: string        # logic | performance | security | ux | data-integrity
        component: string       # which service/module is affected
        title: string           # one-line bug summary
        description: string     # detailed description
        steps_to_reproduce: list  # ordered steps
        expected_behavior: string
        actual_behavior: string
        environment: string     # dev | staging | prod
        status: string          # open | in-progress | resolved | wont-fix
        resolution: string      # how it was fixed (populated after fix)
        related_test_case: string  # link to test case that found it
        run_id: string          # pipeline run identifier

    access_patterns:
      - who: qa
        when: test_system workflow
        how: write new bugs; read past bugs to check for regressions
      - who: backend, frontend
        when: refine steps
        how: read open bugs to prioritize fixes
      - who: reviewer
        when: review steps
        how: check if previously reported bugs have been addressed

    written_by:
      - workflow: execution/execute_story → log_bugs (per story, during TDD loop)

  # ─────────────────────────────────────────────
  # 3. REUSABLE PATTERNS
  # ─────────────────────────────────────────────

  - name: patterns
    description: >
      Library of proven, reusable implementation patterns extracted from
      successful builds. Agents reference these to avoid reinventing solutions
      and to maintain consistency across projects and runs.
    retention: persistent
    max_entries: 200

    schema:
      entry:
        id: string            # auto-generated UUID
        timestamp: datetime   # ISO 8601
        name: string          # human-readable pattern name (e.g., "JWT Auth Flow")
        category: string      # auth | caching | error-handling | retry | pagination | logging | security
        language: string      # java | typescript | yaml | dockerfile
        problem: string       # what problem does this pattern solve?
        solution: string      # description of the approach
        code_snippet: string  # reference implementation
        when_to_use: string   # conditions under which this pattern applies
        when_not_to_use: string  # anti-patterns or wrong use cases
        source_run_id: string # which pipeline run produced this pattern
        tags: list            # searchable tags

    access_patterns:
      - who: backend
        when: generate_backend step
        how: read patterns matching current tech stack to reuse proven solutions
      - who: frontend
        when: generate_frontend step
        how: read patterns for API integration, state management, error handling
      - who: architect
        when: design_system step
        how: read patterns to inform architecture decisions
      - who: reviewer
        when: review steps
        how: check if known patterns were applied correctly

    written_by:
      - manual: curated by engineers after successful runs
      - automated: execution/execute_story → extract_patterns (when all tests pass)

    seed_patterns:
      - name: "JWT Authentication"
        category: auth
        problem: "Stateless authentication for REST APIs"
        tags: [auth, jwt, spring-security, stateless]

      - name: "Circuit Breaker"
        category: retry
        problem: "Prevent cascading failures in microservice calls"
        tags: [resilience, resilience4j, circuit-breaker, fallback]

      - name: "API Error Response"
        category: error-handling
        problem: "Consistent error response format across all endpoints"
        tags: [error-handling, rest, exception-handler, global]

      - name: "Cursor Pagination"
        category: pagination
        problem: "Efficient pagination for large datasets without offset"
        tags: [pagination, cursor, performance, api]

      - name: "Structured Logging"
        category: logging
        problem: "Machine-parseable logs with correlation IDs"
        tags: [logging, slf4j, json, correlation-id, observability]

      - name: "Optimistic Locking"
        category: caching
        problem: "Concurrent update handling without pessimistic locks"
        tags: [concurrency, jpa, versioning, conflict-resolution]

  # ─────────────────────────────────────────────
  # 4. PROJECT CONTEXT (cross-run state)
  # ─────────────────────────────────────────────

  - name: project_context
    description: >
      Maintains accumulated project knowledge across pipeline runs.
      Stores the latest versions of key artifacts so subsequent runs
      have awareness of what was previously built. Prevents each run
      from being amnesiac.
    retention: persistent
    max_entries: 50

    schema:
      entry:
        id: string              # auto-generated UUID
        timestamp: datetime     # ISO 8601
        run_id: string          # pipeline run identifier
        run_number: int         # sequential run counter
        idea: string            # original idea that triggered the run
        prd_summary: string     # condensed PRD (not full content, to save space)
        design_summary: string  # condensed design
        tech_stack: object      # { backend: "Spring Boot 3.x", frontend: "React 18", db: "PostgreSQL 16" }
        services: list          # list of microservice names and their responsibilities
        api_endpoints: list     # list of endpoint paths and methods
        db_tables: list         # list of table names and key columns
        open_issues: list       # unresolved items from review/QA
        status: string          # completed | partial | failed

    access_patterns:
      - who: planner
        when: generate_prd step
        how: read to understand what already exists before proposing changes
      - who: architect
        when: design_system step
        how: read to build upon existing architecture, not redesign from scratch
      - who: all agents
        when: any step
        how: read for general project awareness

    written_by:
      - workflow: planning/idea_to_plan → update_project_context
      - workflow: execution/full_pipeline → update_context

  # ─────────────────────────────────────────────
  # 5. SECURITY FINDINGS
  # ─────────────────────────────────────────────

  - name: security_findings
    description: >
      Tracks security vulnerabilities found during security scans.
      Persists across runs to track remediation progress and prevent
      regression of previously fixed vulnerabilities.
    retention: persistent
    max_entries: 500

    schema:
      entry:
        id: string              # auto-generated UUID
        timestamp: datetime     # ISO 8601
        scan_type: string       # stride | owasp | dependency | secrets | config
        severity: string        # critical | high | medium | low | info
        component: string       # affected service/module
        vulnerability: string   # CVE ID or custom identifier
        title: string           # one-line summary
        description: string     # detailed finding
        affected_code: string   # file path + line range or config key
        remediation: string     # recommended fix
        status: string          # open | mitigated | accepted-risk | false-positive
        resolved_in_run: string # run_id where this was fixed
        run_id: string          # run_id where this was found

    access_patterns:
      - who: security
        when: security_scan workflow
        how: write new findings; read past findings to check for regressions
      - who: backend, frontend
        when: generate/refine steps
        how: read open findings to apply fixes proactively
      - who: devops
        when: deploy_pipeline workflow
        how: read to ensure critical/high findings are resolved before deploy
      - who: reviewer
        when: review steps
        how: cross-reference against open security findings

    written_by:
      - workflow: security_scan → consolidated_report