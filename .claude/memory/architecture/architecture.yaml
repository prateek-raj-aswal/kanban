# ────────────────────────────────────────────────────────────
# SECTION 2: DATABASE SCHEMA
# Requirement source: S-02, S-08, S-09, S-14, S-24
# Constraint: UUID PKs, soft deletes on critical entities,
#   indexed reads < 50ms (constraints.md)
# ────────────────────────────────────────────────────────────

database_schema:

  - table: users
    migration: V1__create_users.sql
    story: S-02
    columns:
      - name: id
        type: uuid
        constraints: [PRIMARY KEY, DEFAULT gen_random_uuid()]
      - name: email
        type: varchar(255)
        constraints: [NOT NULL, UNIQUE]
      - name: display_name
        type: varchar(100)
        constraints: [NOT NULL]
      - name: password_hash
        type: varchar(255)
        constraints: [NOT NULL]
      - name: deleted_at
        type: timestamptz
        constraints: [NULLABLE]
        note: soft delete — citing constraints.md "Soft deletes for critical entities"
      - name: created_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
      - name: updated_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
    indexes:
      - name: idx_users_email
        columns: [email]
        type: btree
        predicate: "WHERE deleted_at IS NULL"

  - table: boards
    migration: V2__create_boards.sql
    story: S-08
    columns:
      - name: id
        type: uuid
        constraints: [PRIMARY KEY, DEFAULT gen_random_uuid()]
      - name: name
        type: varchar(255)
        constraints: [NOT NULL]
      - name: owner_id
        type: uuid
        constraints: [NOT NULL, REFERENCES users(id)]
      - name: deleted_at
        type: timestamptz
        constraints: [NULLABLE]
      - name: created_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
      - name: updated_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
    indexes:
      - name: idx_boards_owner
        columns: [owner_id]
        type: btree
        predicate: "WHERE deleted_at IS NULL"

  - table: board_members
    migration: V2__create_boards.sql
    story: S-08
    columns:
      - name: id
        type: uuid
        constraints: [PRIMARY KEY, DEFAULT gen_random_uuid()]
      - name: board_id
        type: uuid
        constraints: [NOT NULL, REFERENCES boards(id) ON DELETE CASCADE]
      - name: user_id
        type: uuid
        constraints: [NOT NULL, REFERENCES users(id)]
      - name: role
        type: varchar(20)
        constraints: [NOT NULL, DEFAULT 'MEMBER']
        note: "values: OWNER | MEMBER"
      - name: joined_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
    indexes:
      - name: idx_board_members_board
        columns: [board_id]
        type: btree
      - name: idx_board_members_user
        columns: [user_id]
        type: btree
      - name: uq_board_members_board_user
        columns: [board_id, user_id]
        type: unique

  - table: columns
    migration: V3__create_columns.sql
    story: S-09
    note: "Named 'columns' in schema; mapped to Java entity 'BoardColumn' to avoid SQL reserved-word clash"
    columns:
      - name: id
        type: uuid
        constraints: [PRIMARY KEY, DEFAULT gen_random_uuid()]
      - name: board_id
        type: uuid
        constraints: [NOT NULL, REFERENCES boards(id) ON DELETE CASCADE]
      - name: name
        type: varchar(100)
        constraints: [NOT NULL]
      - name: position
        type: double precision
        constraints: [NOT NULL]
        note: fractional indexing — avoids bulk position renumber on reorder
      - name: deleted_at
        type: timestamptz
        constraints: [NULLABLE]
      - name: created_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
      - name: updated_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
    indexes:
      - name: idx_columns_board_position
        columns: [board_id, position]
        type: btree
        predicate: "WHERE deleted_at IS NULL"

  - table: cards
    migration: V4__create_cards_labels.sql
    story: S-14
    columns:
      - name: id
        type: uuid
        constraints: [PRIMARY KEY, DEFAULT gen_random_uuid()]
      - name: column_id
        type: uuid
        constraints: [NOT NULL, REFERENCES columns(id) ON DELETE CASCADE]
      - name: title
        type: varchar(255)
        constraints: [NOT NULL]
      - name: description
        type: text
        constraints: [NULLABLE]
      - name: position
        type: double precision
        constraints: [NOT NULL]
        note: fractional indexing within column
      - name: assignee_id
        type: uuid
        constraints: [NULLABLE, REFERENCES users(id)]
      - name: due_date
        type: date
        constraints: [NULLABLE]
      - name: deleted_at
        type: timestamptz
        constraints: [NULLABLE]
      - name: created_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
      - name: updated_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
    indexes:
      - name: idx_cards_column_position
        columns: [column_id, position]
        type: btree
        predicate: "WHERE deleted_at IS NULL"
      - name: idx_cards_assignee
        columns: [assignee_id]
        type: btree
        predicate: "WHERE deleted_at IS NULL AND assignee_id IS NOT NULL"

  - table: labels
    migration: V4__create_cards_labels.sql
    story: S-14
    columns:
      - name: id
        type: uuid
        constraints: [PRIMARY KEY, DEFAULT gen_random_uuid()]
      - name: board_id
        type: uuid
        constraints: [NOT NULL, REFERENCES boards(id) ON DELETE CASCADE]
      - name: name
        type: varchar(50)
        constraints: [NOT NULL]
      - name: color
        type: varchar(7)
        constraints: [NOT NULL]
        note: hex color, e.g. "#FF5733"
      - name: created_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
    indexes:
      - name: idx_labels_board
        columns: [board_id]
        type: btree
      - name: uq_labels_board_name
        columns: [board_id, name]
        type: unique

  - table: card_labels
    migration: V4__create_cards_labels.sql
    story: S-14
    columns:
      - name: card_id
        type: uuid
        constraints: [NOT NULL, REFERENCES cards(id) ON DELETE CASCADE]
      - name: label_id
        type: uuid
        constraints: [NOT NULL, REFERENCES labels(id) ON DELETE CASCADE]
    indexes:
      - name: pk_card_labels
        columns: [card_id, label_id]
        type: primary_key

  - table: board_invitations
    migration: V5__create_invitations.sql
    story: S-24
    columns:
      - name: id
        type: uuid
        constraints: [PRIMARY KEY, DEFAULT gen_random_uuid()]
      - name: board_id
        type: uuid
        constraints: [NOT NULL, REFERENCES boards(id) ON DELETE CASCADE]
      - name: invited_by
        type: uuid
        constraints: [NOT NULL, REFERENCES users(id)]
      - name: invitee_email
        type: varchar(255)
        constraints: [NOT NULL]
      - name: token
        type: varchar(255)
        constraints: [NOT NULL, UNIQUE]
        note: secure random token, single-use
      - name: status
        type: varchar(20)
        constraints: [NOT NULL, DEFAULT 'PENDING']
        note: "values: PENDING | ACCEPTED | EXPIRED"
      - name: expires_at
        type: timestamptz
        constraints: [NOT NULL]
      - name: created_at
        type: timestamptz
        constraints: [NOT NULL, DEFAULT now()]
    indexes:
      - name: idx_invitations_token
        columns: [token]
        type: btree
      - name: idx_invitations_board
        columns: [board_id]
        type: btree
      - name: idx_invitations_email
        columns: [invitee_email]
        type: btree


# ────────────────────────────────────────────────────────────
# SECTION 3: SERVICE INTERFACES
# Deep module principle: narrow interface, deep implementation
# ────────────────────────────────────────────────────────────

service_interfaces:

  - interface: AuthService
    story_ref: [S-03, S-04, S-05]
    methods:
      - name: register
        input: { email: string, displayName: string, passwordHash: string }
        output: { userId: uuid, email: string }
        throws: [UserAlreadyExistsException]

      - name: login
        input: { email: string, rawPassword: string }
        output: { accessToken: string, expiresIn: int }
        throws: [InvalidCredentialsException]

      - name: validateToken
        input: { token: string }
        output: { userId: uuid, email: string }
        throws: [InvalidTokenException, TokenExpiredException]

  - interface: BoardService
    story_ref: [S-10, S-28]
    methods:
      - name: createBoard
        input: { name: string, requestingUserId: uuid }
        output: BoardResponse
        throws: []

      - name: getBoardsForUser
        input: { userId: uuid }
        output: List<BoardResponse>
        throws: []

      - name: getBoardById
        input: { boardId: uuid, requestingUserId: uuid }
        output: BoardResponse
        throws: [BoardNotFoundException, ForbiddenException]

      - name: deleteBoard
        input: { boardId: uuid, requestingUserId: uuid }
        output: void
        throws: [BoardNotFoundException, ForbiddenException]

      - name: getMembers
        input: { boardId: uuid, requestingUserId: uuid }
        output: List<MemberResponse>
        throws: [BoardNotFoundException, ForbiddenException]

  - interface: ColumnService
    story_ref: [S-11]
    methods:
      - name: createColumn
        input: { boardId: uuid, name: string, requestingUserId: uuid }
        output: ColumnResponse
        throws: [BoardNotFoundException, ForbiddenException]

      - name: renameColumn
        input: { columnId: uuid, name: string, requestingUserId: uuid }
        output: ColumnResponse
        throws: [ColumnNotFoundException, ForbiddenException]

      - name: deleteColumn
        input: { columnId: uuid, requestingUserId: uuid }
        output: void
        throws: [ColumnNotFoundException, ForbiddenException]

      - name: reorderColumns
        input: { boardId: uuid, orderedColumnIds: List<uuid>, requestingUserId: uuid }
        output: List<ColumnResponse>
        throws: [BoardNotFoundException, ForbiddenException, InvalidOrderException]

  - interface: CardService
    story_ref: [S-15, S-19]
    methods:
      - name: createCard
        input: { columnId: uuid, title: string, requestingUserId: uuid }
        output: CardResponse
        throws: [ColumnNotFoundException, ForbiddenException]

      - name: getCard
        input: { cardId: uuid, requestingUserId: uuid }
        output: CardResponse
        throws: [CardNotFoundException, ForbiddenException]

      - name: updateCard
        input: { cardId: uuid, patch: CardPatch, requestingUserId: uuid }
        output: CardResponse
        throws: [CardNotFoundException, ForbiddenException]

      - name: deleteCard
        input: { cardId: uuid, requestingUserId: uuid }
        output: void
        throws: [CardNotFoundException, ForbiddenException]

      - name: moveCard
        input: { cardId: uuid, targetColumnId: uuid, afterCardId: uuid_or_null, requestingUserId: uuid }
        output: CardResponse
        throws: [CardNotFoundException, ColumnNotFoundException, ForbiddenException]

  - interface: LabelService
    story_ref: [S-16]
    methods:
      - name: createLabel
        input: { boardId: uuid, name: string, color: string, requestingUserId: uuid }
        output: LabelResponse
        throws: [BoardNotFoundException, ForbiddenException, LabelAlreadyExistsException]

      - name: getLabelsForBoard
        input: { boardId: uuid, requestingUserId: uuid }
        output: List<LabelResponse>
        throws: [BoardNotFoundException, ForbiddenException]

      - name: deleteLabel
        input: { labelId: uuid, requestingUserId: uuid }
        output: void
        throws: [LabelNotFoundException, ForbiddenException]

  - interface: InvitationService
    story_ref: [S-25, S-26]
    methods:
      - name: createInvitation
        input: { boardId: uuid, inviteeEmail: string, requestingUserId: uuid }
        output: InvitationResponse
        throws: [BoardNotFoundException, ForbiddenException, UserAlreadyMemberException]

      - name: acceptInvitation
        input: { token: string, requestingUserId: uuid }
        output: BoardResponse
        throws: [InvitationNotFoundException, InvitationExpiredException, InvitationAlreadyUsedException]

  - interface: EventBroadcastService
    story_ref: [S-22]
    methods:
      - name: broadcastBoardEvent
        input: { boardId: uuid, event: BoardEventPayload }
        output: void
        note: publishes to /topic/boards/{boardId} via SimpMessagingTemplate


# ────────────────────────────────────────────────────────────
# SECTION 4: API CONTRACTS
# Requirement source: all story endpoints
# Constraint: /api/v1 URL versioning (constraints.md)
# Error schema: memory.patterns "API Error Response"
# ────────────────────────────────────────────────────────────

api_contracts:

  # ── Auth ────────────────────────────────────────────────
  - id: POST /api/v1/auth/register
    story: S-03
    method: POST
    path: /api/v1/auth/register
    auth_required: false
    request_body:
      email: { type: string, format: email, required: true }
      displayName: { type: string, minLength: 1, maxLength: 100, required: true }
      password: { type: string, minLength: 8, required: true }
    responses:
      201:
        id: uuid
        email: string
        displayName: string
        createdAt: iso8601
      409:
        error: string
        code: "EMAIL_ALREADY_EXISTS"
      422:
        error: string
        code: "VALIDATION_FAILED"
        fields: [{ field: string, message: string }]

  - id: POST /api/v1/auth/login
    story: S-04
    method: POST
    path: /api/v1/auth/login
    auth_required: false
    request_body:
      email: { type: string, format: email, required: true }
      password: { type: string, required: true }
    responses:
      200:
        accessToken: string
        tokenType: "Bearer"
        expiresIn: 3600
      401:
        error: string
        code: "INVALID_CREDENTIALS"
      422:
        error: string
        code: "VALIDATION_FAILED"
        fields: [{ field: string, message: string }]

  # ── Boards ──────────────────────────────────────────────
  - id: POST /api/v1/boards
    story: S-10
    method: POST
    path: /api/v1/boards
    auth_required: true
    request_body:
      name: { type: string, minLength: 1, maxLength: 255, required: true }
    responses:
      201:
        id: uuid
        name: string
        ownerId: uuid
        createdAt: iso8601
      422:
        error: string
        code: "VALIDATION_FAILED"
        fields: [{ field: string, message: string }]
      401:
        error: string
        code: "UNAUTHORIZED"

  - id: GET /api/v1/boards
    story: S-10
    method: GET
    path: /api/v1/boards
    auth_required: true
    request_body: null
    responses:
      200:
        items: [{ id: uuid, name: string, ownerId: uuid, role: string, createdAt: iso8601 }]
      401:
        error: string
        code: "UNAUTHORIZED"

  - id: GET /api/v1/boards/{boardId}
    story: S-10
    method: GET
    path: /api/v1/boards/{boardId}
    auth_required: true
    path_params:
      boardId: uuid
    responses:
      200:
        id: uuid
        name: string
        ownerId: uuid
        columns:
          - id: uuid
            name: string
            position: number
            cards:
              - id: uuid
                title: string
                description: string
                position: number
                assigneeId: uuid
                dueDate: date
                labels: [{ id: uuid, name: string, color: string }]
      403:
        error: string
        code: "FORBIDDEN"
      404:
        error: string
        code: "BOARD_NOT_FOUND"
      401:
        error: string
        code: "UNAUTHORIZED"

  - id: DELETE /api/v1/boards/{boardId}
    story: S-10
    method: DELETE
    path: /api/v1/boards/{boardId}
    auth_required: true
    path_params:
      boardId: uuid
    responses:
      204: {}
      403:
        error: string
        code: "FORBIDDEN"
      404:
        error: string
        code: "BOARD_NOT_FOUND"
      401:
        error: string
        code: "UNAUTHORIZED"

  # ── Columns ─────────────────────────────────────────────
  - id: POST /api/v1/boards/{boardId}/columns
    story: S-11
    method: POST
    path: /api/v1/boards/{boardId}/columns
    auth_required: true
    path_params:
      boardId: uuid
    request_body:
      name: { type: string, minLength: 1, maxLength: 100, required: true }
    responses:
      201:
        id: uuid
        boardId: uuid
        name: string
        position: number
        createdAt: iso8601
      403:
        error: string
        code: "FORBIDDEN"
      404:
        error: string
        code: "BOARD_NOT_FOUND"
      422:
        error: string
        code: "VALIDATION_FAILED"
        fields: [{ field: string, message: string }]
      401:
        error: string
        code: "UNAUTHORIZED"

  - id: PATCH /api/v1/columns/{columnId}
    story: S-11
    method: PATCH
    path: /api/v1/columns/{columnId}
    auth_required: true
    path_params:
      columnId: uuid
    request_body:
