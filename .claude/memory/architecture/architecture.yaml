    new_components:

      - path: codebase/frontend/src/components/ui/AmbientBg.tsx
        story: US-1811
        props:
          theme: ThemeObject
        description: |
          Renders behind all content (position:absolute, inset:0, pointerEvents:none,
          overflow:hidden, zIndex:0). Three layers when theme.gradient=true:
          1. canvasGradient div (position:absolute, inset:0, background:theme.canvasGradient)
          2. Blob divs: borderRadius:50%, background:blob.color, filter:blur(80px), positioned per blob.style
          3. gridColor dot-grid overlay when theme.gridColor is defined:
             backgroundImage:radial-gradient(theme.gridColor 1px, transparent 1px), backgroundSize:3px 3px
          Returns null when theme.gradient=false (classic themes).
        glassmorphism_values:
          column: "backdropFilter: theme.glass ? 'blur(16px) saturate(130%)' : undefined"
          sidebar_topbar: "backdropFilter: theme.glass ? 'blur(20px) saturate(140%)' : undefined"
          card: "backdropFilter: theme.glass ? 'blur(8px)' : undefined"

      - path: codebase/frontend/src/components/ui/SettingsModal.tsx
        story: US-1814
        props:
          onClose: "() => void"
        state:
          - selectedTheme: ThemeName
          - selectedDensity: DensityName
        description: |
          Modal with two sections:
          1. Theme picker: 20 themed swatches arranged in two rows (6 classic + 14 premium).
             Each swatch shows a mini preview square (canvas color + accent dot).
             Selecting a theme calls themeStore.setTheme(name) + applyTheme(name).
          2. Density picker: three labelled buttons (Compact / Comfortable / Spacious).
             Selecting calls themeStore.setDensity(name) + applies CSS vars.
          Active selections show a ring indicator.
          Persists via themeStore (localStorage).

    modified_components:

      - path: codebase/frontend/src/components/board/TimelineView.tsx
        story: US-1820
        type: rewrite
        description: |
          Full Gantt-style swimlane timeline. Fetches live board data from boardStore
          (cards with startDate + dueDate). Layout uses CSS Grid:
          grid-template-columns: 200px repeat(N, 28px) where N = date range in days.
          Features:
          - Sticky 200px left panel: card title, column name, priority badge
          - Month + day header row
          - Today-line (2px accent-colored vertical line)
          - Weekend shading (Saturday/Sunday columns at 30% opacity)
          - Card bars from startDate to dueDate, coloured by priority at 40% opacity
          - Hover glow on card bars
          - Click on bar opens CardModal
          - Cards without startDate OR dueDate show in a "No dates" swimlane at bottom
          - Swimlane groups by column name
          Data source: GET /api/v1/boards/{boardId}/cards/timeline (TL-01)
          On mount: fetch date range (default: today-30d to today+90d)
          Resize handles: 8px left/right edges of each bar; mousedown drag updates dates
          optimistically; mouseup fires PATCH /api/v1/cards/{cardId}/dates

      - path: codebase/frontend/src/components/boards/CreateBoardModal.tsx
        story: US-1817
        type: enrichment
        description: |
          Adds to existing modal:
          1. Description textarea (maxLength 2000, optional)
          2. Emoji picker: 16-symbol grid ['◇','◆','◈','⬡','⬢','★','♦','●','■','▲','◉','⊕','⊗','⊘','✦','⬟']
             Active emoji shows ring indicator; default '◇'
          3. Colour swatches: 9-colour palette from KB_COLORS subset for board identity
          4. Live preview panel: shows board card preview with selected emoji, name, colour

      - path: codebase/frontend/src/components/board/CardItem.tsx
        story: US-1818
        type: modification
        description: |
          Adds a 3px top accent stripe using the card's color field.
          If card.color is non-null: render a div with height:3px, backgroundColor:card.color,
          borderRadius:'{cardRadius}px {cardRadius}px 0 0' at the very top of the card.
          If card.color is null: no stripe rendered.
          The stripe is positioned inside the card container, before the card content.

      - path: codebase/frontend/src/components/board/Column.tsx
        story: US-1819
        type: modification
        description: |
          Column colour picker upgrade from 8-token system to 24-swatch hex picker.
          Uses the KB_COLORS palette (24 colours including null for "no colour").
          KB_COLORS = [null, '#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e',
            '#10b981','#14b8a6','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#a855f7',
            '#ec4899','#f43f5e','#64748b','#374151','#1e293b','#78716c','#a3a3a3',
            '#d4d4d4','#fafafa','#000000']
          Swatch click: calls PATCH /api/v1/columns/{columnId} with { color: hex | null }.
          Picker is re-openable (click swatch indicator to re-open when already coloured).
          Sends hex string directly (not token name).

      - path: codebase/frontend/src/app/layout.tsx
        story: US-1815
        type: modification
        description: |
          Adds boot splash overlay: a fixed full-screen div (zIndex:9999) that renders
          a pulsing SVG logo (the same SVG as the favicon). On mount, fades out after
          1800ms using a CSS opacity transition (duration 400ms). Removed from DOM after
          fade-out completes (transitionend event). Implemented as a <BootSplash>
          client component imported into layout.tsx.

      - path: codebase/frontend/src/app/layout.tsx
        story: US-1816
        type: modification
        description: |
          Replaces any existing <link rel="icon"> with an inline SVG data-URI favicon:
          <link rel="icon" href="data:image/svg+xml,{encodedSVG}" />
          SVG: a stylized 'K' in accent colour (#6366f1 for default theme) on transparent bg.
          The data URI is constructed at build time (static string in layout.tsx).

    modified_stores:

      - path: codebase/frontend/src/store/themeStore.ts
        story: US-1813
        changes:
          - "Add density: DensityName field (initial: 'comfortable', persisted to localStorage)"
          - "Add setDensity(density: DensityName) action"
          - "setDensity applies CSS vars for all DENSITY[density] tokens to document.documentElement"
          - "On store hydration, re-apply density CSS vars from persisted value"
          - "Add applyCSSVars helper that writes --card-pad, --card-radius, --card-gap, --card-fs, etc."

