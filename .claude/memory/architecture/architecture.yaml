  # ==========================================================================
  # P2-SECTION 4: VERIFICATION STORIES — CONTINGENT CONTRACTS
  # Requirement source: US-1805..US-1809
  # ==========================================================================
  p2_verification_contracts:

    - story: US-1805
      title: "Verify board description"
      checks:
        - "GET /api/v1/boards/{boardId} returns description field (string|null) in response"
        - "POST /api/v1/boards accepts description in request body"
        - "PUT /api/v1/boards/{boardId} (P2-API-03) accepts and persists description"
      gap_fix:
        if_field_missing_in_db: "Run ALTER TABLE boards ADD COLUMN IF NOT EXISTS description TEXT;"
        if_field_missing_in_dto: "Add description field to BoardResponse and CreateBoardRequest"
        if_no_update_endpoint: "Ensure P2-API-03 (PUT /api/v1/boards/{boardId}) is implemented"

    - story: US-1806
      title: "Verify column color"
      checks:
        - "PATCH /api/v1/columns/{columnId} accepts color field (nullable hex) in request"
        - "GET /api/v1/boards/{boardId} returns color on each column in response"
        - "architecture_column_color.yaml documents V15 migration for headerColor (token-based)"
        - "P2 requires free-form hex color field (24-swatch); verify existing 'color' hex field or add it"
      gap_fix:
        if_only_token_field_present:
          migration: "ALTER TABLE columns ADD COLUMN IF NOT EXISTS color VARCHAR(20);"
          backend: "Add color field to BoardColumn entity, ColumnResponse, UpdateColumnRequest"
          note: "Distinct from legacy headerColor token field; additive, not replacing"

    - story: US-1807
      title: "Verify card color"
      checks:
        - "PATCH /api/v1/cards/{cardId} accepts color field (nullable hex) in request"
        - "GET /api/v1/cards/{cardId} returns color (string|null) in response"
        - "BoardResponse columns[].cards[].color is present in deep-load response"
      gap_fix:
        if_field_missing_in_db: "Run ALTER TABLE cards ADD COLUMN IF NOT EXISTS color VARCHAR(20);"
        if_field_missing_in_dto: "Add color field to Card entity, CardResponse, PATCH request body"

    - story: US-1808
      title: "Verify Issue entity CRUD"
      checks:
        - "POST /api/v1/boards/{boardId}/issues (or equivalent) creates an issue"
        - "GET /api/v1/boards/{boardId}/issues lists issues"
        - "GET /api/v1/issues/{issueId} reads single issue"
        - "PATCH /api/v1/issues/{issueId} updates issue"
        - "DELETE /api/v1/issues/{issueId} soft-deletes issue"
      gap_fix:
        note: "If any CRUD endpoint is missing, implement the missing endpoint(s). Story is confirmation-and-fix."
        deferred_if_fully_present: "Mark story DONE without code changes if all five endpoints verified."

    - story: US-1809
      title: "Verify/add starred-boards endpoints + UserBoardStar"
      checks:
        - "POST /api/v1/boards/{boardId}/star — exists and returns 201 (or 204)"
        - "DELETE /api/v1/boards/{boardId}/star — exists and returns 204"
        - "GET /api/v1/boards?starred=true — filter returns only starred boards"
        - "BS-03 (GET /api/v1/boards/starred) already exists per existing architecture"
      gap_fix:
        if_star_endpoints_missing: "Implement per P2-API-04 and P2-API-05 contracts above"
        if_filter_param_missing: "Add ?starred=true query parameter to BoardController.getBoards()"
        note: "board_stars table (V14) and BoardStarService already defined in existing architecture."

