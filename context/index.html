<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanban — Life OS</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
    body { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #root { height: 100%; }
    /* Wave hides the canvas's grid div before app boots */
    #boot { position: fixed; inset: 0; background: #f0eee9; display: flex; align-items: center; justify-content: center; color: rgba(60,50,40,.5); font-size: 13px; transition: opacity .25s; }
    .booted #boot { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="boot">Loading Life OS…</div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="themes.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="atoms.jsx"></script>
  <script type="text/babel" src="board.jsx"></script>
  <script type="text/babel" src="modal.jsx"></script>
  <script type="text/babel" src="timeline.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // remove the boot splash once react has rendered
    setTimeout(() => document.body.classList.add('booted'), 400);
    setTimeout(() => { const b = document.getElementById('boot'); if (b) b.remove(); }, 800);
  </script>
</body>
</html>
