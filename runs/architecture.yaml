# ────────────────────────────────────────────────────────────
# SECTION 7: COMPONENT BOUNDARIES
# Deep Modules: narrow interface, deep implementation
# ────────────────────────────────────────────────────────────

component_boundaries:

  - name: AuthModule
    story_ref: [S-02, S-03, S-04, S-05]
    responsibilities:
      - User registration with password hashing (BCrypt)
      - JWT issuance and validation
      - Spring Security filter chain configuration
    hides:
      - BCrypt salt and hash internals
      - JWT signing algorithm and secret rotation
      - UserDetails loading logic
    interface_surface: [POST /api/v1/auth/register, POST /api/v1/auth/login, JwtAuthenticationFilter (internal Spring filter)]

  - name: BoardModule
    story_ref: [S-08, S-10, S-28]
    responsibilities:
      - Board lifecycle (create, read, soft-delete)
      - Board membership enforcement (authorization gate for all board-scoped resources)
      - Member listing
    hides:
      - board_members join table management
      - soft-delete filter application
    interface_surface: [POST /api/v1/boards, GET /api/v1/boards, GET /api/v1/boards/{boardId}, DELETE /api/v1/boards/{boardId}, GET /api/v1/boards/{boardId}/members]

  - name: ColumnModule
    story_ref: [S-09, S-11]
    responsibilities:
      - Column CRUD within a board
      - Position assignment using fractional indexing
    hides:
      - fractional position recalculation algorithm
      - board membership check delegation to BoardModule
    interface_surface: [POST /api/v1/boards/{boardId}/columns, PATCH /api/v1/columns/{columnId}, DELETE /api/v1/columns/{columnId}, PATCH /api/v1/boards/{boardId}/columns/reorder]

  - name: CardModule
    story_ref: [S-14, S-15, S-16, S-19]
    responsibilities:
      - Card CRUD within a column
      - Card move across columns with position recalculation
      - Label assignment to cards
    hides:
      - position midpoint calculation for moves
      - label-card join table management
    interface_surface: [POST /api/v1/columns/{columnId}/cards, GET /api/v1/cards/{cardId}, PATCH /api/v1/cards/{cardId}, DELETE /api/v1/cards/{cardId}, PATCH /api/v1/cards/{cardId}/move, POST /api/v1/boards/{boardId}/labels, GET /api/v1/boards/{boardId}/labels, DELETE /api/v1/labels/{labelId}]

  - name: RealtimeModule
    story_ref: [S-21, S-22, S-23]
    responsibilities:
      - STOMP WebSocket gateway configuration
      - Broadcasting board mutations to all board subscribers
    hides:
      - SimpMessagingTemplate usage
      - topic name construction
    interface_surface: [EventBroadcastService.broadcastBoardEvent (internal), /topic/boards/{boardId} (subscription)]

  - name: InvitationModule
    story_ref: [S-24, S-25, S-26, S-27, S-28]
    responsibilities:
      - Invitation token generation and single-use enforcement
      - Invitation acceptance — adds user to board_members
    hides:
      - token generation strategy (SecureRandom)
      - expiry enforcement logic
    interface_surface: [POST /api/v1/boards/{boardId}/invitations, POST /api/v1/invitations/accept]

  - name: FrontendBoardState
    story_ref: [S-12, S-13, S-17, S-18, S-20, S-23]
    responsibilities:
      - Zustand store as single source of truth for board data
      - Optimistic UI updates on drag-drop, then reconcile with WS event
      - Card drawer manages card detail read/write
    hides:
      - WS message dispatch-to-store reducer logic
      - dnd-kit sensor configuration
    interface_surface: [boardStore.ts exports (useBoardStore hook), websocket.ts (internal subscribe call)]
