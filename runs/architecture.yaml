# ────────────────────────────────────────────────────────────
# SECTION 5: WEBSOCKET EVENTS
# Requirement source: S-21 (STOMP config), S-22 (broadcast),
#   S-23 (client subscription)
# Constraint: real-time sync delay < 500ms (constraints.md)
# Pattern: board-scoped topic limits fan-out to members only
# ────────────────────────────────────────────────────────────

websocket:
  transport: STOMP over SockJS
  endpoint: /ws
    note: SockJS fallback endpoint registered in WebSocketConfig
  broker_prefix: /topic
  app_destination_prefix: /app
    note: client-to-server messages (not used in this design — all mutations go via REST)

  subscription_topics:
    - topic: /topic/boards/{boardId}
      description: >
        All board-level events for a given board. The backend validates
        that the subscribing user is a member of the board before the
        subscription is honored (citing security constraint — auth required).
      auth_required: true

  events:

    - name: CARD_CREATED
      story: S-22
      topic: /topic/boards/{boardId}
      trigger: POST /api/v1/columns/{columnId}/cards succeeds
      payload:
        eventType: "CARD_CREATED"
        boardId: uuid
        timestamp: iso8601
        data:
          id: uuid
          columnId: uuid
          title: string
          position: number
          assigneeId: uuid_or_null
          dueDate: date_or_null
          labels: []

    - name: CARD_UPDATED
      story: S-22
      topic: /topic/boards/{boardId}
      trigger: PATCH /api/v1/cards/{cardId} succeeds
      payload:
        eventType: "CARD_UPDATED"
        boardId: uuid
        timestamp: iso8601
        data:
          id: uuid
          columnId: uuid
          title: string
          description: string_or_null
          assigneeId: uuid_or_null
          dueDate: date_or_null
          labels: [{ id: uuid, name: string, color: string }]
          updatedAt: iso8601

    - name: CARD_MOVED
      story: S-22
      topic: /topic/boards/{boardId}
      trigger: PATCH /api/v1/cards/{cardId}/move succeeds
      payload:
        eventType: "CARD_MOVED"
        boardId: uuid
        timestamp: iso8601
        data:
          id: uuid
          fromColumnId: uuid
          toColumnId: uuid
          newPosition: number
          updatedAt: iso8601

    - name: CARD_DELETED
      story: S-22
      topic: /topic/boards/{boardId}
      trigger: DELETE /api/v1/cards/{cardId} succeeds
      payload:
        eventType: "CARD_DELETED"
        boardId: uuid
        timestamp: iso8601
        data:
          id: uuid
          columnId: uuid

    - name: COLUMN_CREATED
      story: S-22
      topic: /topic/boards/{boardId}
      trigger: POST /api/v1/boards/{boardId}/columns succeeds
      payload:
        eventType: "COLUMN_CREATED"
        boardId: uuid
        timestamp: iso8601
        data:
          id: uuid
          name: string
          position: number

    - name: COLUMN_UPDATED
      story: S-22
      topic: /topic/boards/{boardId}
      trigger: PATCH /api/v1/columns/{columnId} succeeds
      payload:
        eventType: "COLUMN_UPDATED"
        boardId: uuid
        timestamp: iso8601
        data:
          id: uuid
          name: string

    - name: COLUMN_REORDERED
      story: S-22
      topic: /topic/boards/{boardId}
      trigger: PATCH /api/v1/boards/{boardId}/columns/reorder succeeds
      payload:
        eventType: "COLUMN_REORDERED"
        boardId: uuid
        timestamp: iso8601
        data:
          columns: [{ id: uuid, position: number }]

    - name: COLUMN_DELETED
      story: S-22
      topic: /topic/boards/{boardId}
      trigger: DELETE /api/v1/columns/{columnId} succeeds
      payload:
        eventType: "COLUMN_DELETED"
        boardId: uuid
        timestamp: iso8601
        data:
          id: uuid


