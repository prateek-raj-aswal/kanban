# ────────────────────────────────────────────────────────────
# SECTION 1: DIRECTORY STRUCTURE
# Requirement source: S-01 (monorepo init), S-29 (Docker Compose),
#   S-32 (CI pipeline), S-05 (Spring Security), S-21 (WebSocket)
# ────────────────────────────────────────────────────────────

directory_structure:
  root: kanban/
  files:
    - docker-compose.yml          # S-01 (stub), S-29 (complete)
    - .env.example                # S-01 (stub), S-29 (complete)
    - .gitignore                  # S-01
    - README.md                   # S-01
  directories:
    - path: .github/workflows/
      files:
        - ci.yml                  # S-32

    - path: frontend/
      description: Next.js 14 App Router application
      files:
        - package.json
        - tsconfig.json
        - next.config.ts
        - .env.local.example
        - Dockerfile              # S-29
      directories:
        - path: frontend/src/app/
          description: Next.js App Router pages
          files:
            - layout.tsx           # root layout, auth provider
            - page.tsx             # redirect to /boards or /login
          directories:
            - path: frontend/src/app/(auth)/
              files:
                - login/page.tsx   # S-07
                - register/page.tsx # S-06
            - path: frontend/src/app/(protected)/
              files:
                - layout.tsx       # auth guard wrapper
              directories:
                - path: frontend/src/app/(protected)/boards/
                  files:
                    - page.tsx     # S-12: /boards list
                    - "[boardId]/page.tsx"  # S-13: /boards/[boardId]
                - path: frontend/src/app/(protected)/join/
                  files:
                    - page.tsx     # S-27: /join?token=...

        - path: frontend/src/components/
          directories:
            - path: frontend/src/components/auth/
              files:
                - LoginForm.tsx    # S-07
                - RegisterForm.tsx # S-06
            - path: frontend/src/components/boards/
              files:
                - BoardList.tsx    # S-12
                - BoardCard.tsx    # S-12
                - CreateBoardModal.tsx # S-10
            - path: frontend/src/components/board/
              files:
                - BoardView.tsx    # S-13
                - ColumnList.tsx   # S-13
                - Column.tsx       # S-13
                - CardItem.tsx     # S-17, S-20
                - CardCreateForm.tsx  # S-17
                - CardDrawer.tsx   # S-18
                - InviteModal.tsx  # S-27
                - MemberList.tsx   # S-28
            - path: frontend/src/components/ui/
              files:
