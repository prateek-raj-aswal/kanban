        - settings.gradle
        - gradlew
        - Dockerfile
      directories:
        - path: backend/src/main/java/com/kanban/
          directories:
            - path: backend/src/main/java/com/kanban/controller/
              files:
                - AuthController.java      # S-03, S-04
                - BoardController.java     # S-10
                - ColumnController.java    # S-11
                - CardController.java      # S-15, S-19
                - LabelController.java     # S-16
